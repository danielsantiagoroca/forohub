# ForoHub - Configuración
spring.main.encoding=UTF-8
server.port=8080

# PostgreSQL (mismas credenciales que LiterAlura)
spring.datasource.url=jdbc:postgresql://192.168.122.147:5432/forohub
spring.datasource.username=${DB_USER_SCREENMATCH}
spring.datasource.password=${DB_PASSWORD_POSTGRE}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT (clave secreta para firmar tokens; en producción usar variable de entorno)
app.jwt.secret=${JWT_SECRET:forohub-clave-secreta-minimo-256-bits-para-hs256-requerimiento-de-seguridad}
app.jwt.expiration-ms=86400000

logging.level.com.oracleone.forohub=DEBUG
logging.level.org.springframework.security=DEBUG